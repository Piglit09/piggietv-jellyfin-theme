<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Piggie Hub icon</title>
  <desc id="desc">A neon pink and blue rounded triangular badge with a stylized pig silhouette inside, inspired by the PiggieTV logo.</desc>

  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3bbd"/>
      <stop offset="55%" stop-color="#9b6dff"/>
      <stop offset="100%" stop-color="#9fe3ff"/>
    </linearGradient>

    <linearGradient id="pigGrad" x1="0%" y1="15%" x2="100%" y2="85%">
      <stop offset="0%" stop-color="#b8f0ff"/>
      <stop offset="38%" stop-color="#8a7cff"/>
      <stop offset="68%" stop-color="#ff55d3"/>
      <stop offset="100%" stop-color="#ff8ee4"/>
    </linearGradient>

    <linearGradient id="innerGrad" x1="25%" y1="10%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#4f1cff"/>
      <stop offset="100%" stop-color="#2b0d69"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer neon badge -->
  <path
    d="M32 4
       C36 4 39.5 6.1 41.8 9.6
       L56 31.4
       C58.2 34.8 58.4 39 56.4 42.6
       C54.4 46.1 50.8 48.2 46.8 48.2
       H17.2
       C13.2 48.2 9.6 46.1 7.6 42.6
       C5.6 39 5.8 34.8 8 31.4
       L22.2 9.6
       C24.5 6.1 28 4 32 4Z"
    fill="url(#frameGrad)"
    filter="url(#glow)"
    opacity="0.98"
  />

  <!-- inner cutout -->
  <path
    d="M32 10
       C34.9 10 37.5 11.5 39.2 14
       L50.6 31.6
       C52.2 34 52.3 36.9 50.9 39.4
       C49.4 41.9 46.9 43.4 44.1 43.4
       H19.9
       C17.1 43.4 14.6 41.9 13.1 39.4
       C11.7 36.9 11.8 34 13.4 31.6
       L24.8 14
       C26.5 11.5 29.1 10 32 10Z"
    fill="url(#innerGrad)"
  />

  <!-- pig body -->
  <g fill="url(#pigGrad)" filter="url(#glow)">
    <ellipse cx="30.5" cy="29.2" rx="12" ry="8.8"/>
    <ellipse cx="42.4" cy="29.2" rx="6.6" ry="5.6"/>
    <rect x="22.1" y="33.8" width="3.2" height="7.1" rx="1.4"/>
    <rect x="31.1" y="34.2" width="3.2" height="6.8" rx="1.4"/>
    <rect x="16.4" y="34.1" width="3.1" height="6.7" rx="1.4"/>
    <polygon points="36.4,22.8 39.4,18.5 41.8,23.4"/>
    <polygon points="27.4,22.1 24.2,17.8 22.2,22.8"/>
    <path d="M18.6 26.7c-2.3-.9-4.1-2.7-4.7-5
             c-.3-1.2.9-2.1 1.9-1.4
             c.6.4 1.1.9 1.6 1.5
             c.6-2 2.3-3.5 4.3-4
             c1.2-.3 2.1 1 1.3 2
             c-1.6 1.8-2.8 4.2-2.8 6.9
             c0 .5-.4.6-.8.5
             c-.3-.1-.6-.2-.8-.5Z"/>
  </g>

  <!-- snout -->
  <ellipse cx="45.1" cy="30.2" rx="3.2" ry="2.6" fill="#ff9ae8"/>
  <ellipse cx="44" cy="30.2" rx="0.48" ry="0.72" fill="#8a2cc9"/>
  <ellipse cx="46.2" cy="30.2" rx="0.48" ry="0.72" fill="#8a2cc9"/>

  <!-- eyes -->
  <ellipse cx="40.9" cy="26.2" rx="0.7" ry="1" fill="#f6fbff"/>
  <ellipse cx="33.7" cy="23.8" rx="0.72" ry="1.02" fill="#f6fbff"/>

  <!-- small hub sparkle -->
  <g filter="url(#glow)">
    <path d="M50.5 15.2 52 18.2 55 19.7 52 21.2 50.5 24.2 49 21.2 46 19.7 49 18.2Z" fill="#b2f1ff"/>
  </g>
</svg>
